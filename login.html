<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - BTDC Admin</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="assets/icons/favicon.ico" type="image/x-icon">
</head>
<body style="background: var(--primary-dark);">
  <header>
    <div class="header-inner">
      <a href="index.html" class="logo">
        <span class="logo-badge">B</span>
        <span>BTDC</span>
      </a>
      <button class="hamburger" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
      <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="track-valuation.html">Track Valuation</a>
        <a href="login.html" class="active">Login</a>
      </nav>
    </div>
  </header>

  <section class="login-section">
    <div class="login-card">
      <div class="logo-center">
        <div class="logo-icon">B</div>
        <h2>Staff / Admin Login</h2>
        <p class="login-subtitle">Sign in to manage valuations</p>
      </div>

      <div id="loginForm">
        <div class="form-group">
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" placeholder="Enter your email" autocomplete="email">
        </div>
        <div class="form-group">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" placeholder="Enter your password" autocomplete="current-password">
        </div>
        <div id="loginError" style="color: var(--error); margin-bottom: 16px; display: none; font-size: 0.9rem;"></div>
        <button class="btn btn-primary" onclick="handleLogin()" id="loginBtn" style="width: 100%;">Sign In</button>
        <a href="index.html" class="login-back-link">Back to Home</a>
      </div>
    </div>
  </section>

  <script type="module">
import { auth, db } from './js/firebase-config.js';
import { signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
import { doc, getDoc } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

window.handleLogin = async function() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const errorEl = document.getElementById('loginError');
  const btn = document.getElementById('loginBtn');

  if (!email || !password) {
    errorEl.textContent = 'Please enter email and password.';
    errorEl.style.display = 'block';
    return;
  }

  errorEl.style.display = 'none';
  btn.textContent = 'Signing in...';
  btn.disabled = true;

  try {
    const cred = await signInWithEmailAndPassword(auth, email, password);
    const uid = cred.user.uid;
    const userDoc = await getDoc(doc(db, 'users', uid));
    if (!userDoc.exists()) {
      await auth.signOut();
      errorEl.textContent = 'Account not authorized. Contact admin.';
      errorEl.style.display = 'block';
      btn.textContent = 'Sign In';
      btn.disabled = false;
      return;
    }
    const role = userDoc.data().role;
    if (role === 'admin') window.location.href = 'admin.html';
    else if (role === 'staff') window.location.href = 'staff.html';
    else {
      await auth.signOut();
      errorEl.textContent = 'Invalid role assigned. Contact admin.';
      errorEl.style.display = 'block';
    }
  } catch (err) {
    errorEl.textContent = err.code === 'auth/user-not-found' || err.code === 'auth/wrong-password' || err.code === 'auth/invalid-credential'
      ? 'Invalid email or password.'
      : err.message;
    errorEl.style.display = 'block';
  }
  btn.textContent = 'Sign In';
  btn.disabled = false;
};

onAuthStateChanged(auth, (user) => {
  if (user) {
    getDoc(doc(db, 'users', user.uid)).then(snap => {
      if (snap.exists()) {
        const role = snap.data().role;
        if (role === 'admin') window.location.href = 'admin.html';
        else if (role === 'staff') window.location.href = 'staff.html';
      }
    });
  }
});

document.getElementById('loginEmail').addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
document.getElementById('loginPassword').addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
</script>
</body>
</html>
