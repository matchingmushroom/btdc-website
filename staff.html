<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Panel - BTDC Valuation Management</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="assets/icons/favicon.ico" type="image/x-icon">
</head>
<body>
  <header>
    <div class="header-inner">
      <a href="index.html" class="logo">
        <span class="logo-badge">B</span>
        <span>BTDC Staff</span>
      </a>
      <button class="hamburger" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
      <nav class="nav-links">
        <a onclick="handleLogout()" style="cursor:pointer;">Logout</a>
      </nav>
    </div>
  </header>

  <section class="section admin-section">
    <div class="container" id="staffContent" style="display:none;">
      <div class="panel-header">
        <div class="panel-header-left">
          <h2>Valuation Records</h2>
          <p id="userInfo"></p>
        </div>
        <div class="panel-actions">
          <input type="text" id="staffSearch" placeholder="Search records..." oninput="renderTable()" class="panel-search">
          <button class="btn btn-primary" onclick="showAddModal()">+ Add New</button>
        </div>
      </div>

      <div class="table-wrapper">
        <table class="admin-table" id="staffTable">
          <thead>
            <tr>
              <th>ID</th>
              <th>Customer</th>
              <th>Ref #</th>
              <th>Property</th>
              <th>Type</th>
              <th>Date</th>
              <th>FMV</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="staffTableBody"></tbody>
        </table>
      </div>
      <p id="noRecords" class="no-records" style="display:none;">No records found.</p>
      <div id="loadingSpinner" class="loading-spinner">Loading...</div>
    </div>
    <div id="authCheck" class="auth-check">
      <p>Checking authorization...</p>
    </div>
  </section>

  <div id="valuationModal" class="modal-overlay" style="display:none;">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modalTitle">Add Valuation</h3>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <form id="valuationForm" onsubmit="saveValuation(event)">
        <input type="hidden" id="editDocId" value="">
        <div class="form-row">
          <div class="form-group">
            <label>Customer Name *</label>
            <input type="text" id="f_CustomerName" required>
          </div>
          <div class="form-group">
            <label>Ref Number *</label>
            <input type="text" id="f_RefNumber" required>
          </div>
        </div>
        <div class="form-group">
          <label>Property Address *</label>
          <input type="text" id="f_PropertyAddress" required>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Plot Number</label>
            <input type="text" id="f_PlotNumber">
          </div>
          <div class="form-group">
            <label>Valuation Type *</label>
            <select id="f_ValuationType">
              <option>Fresh Valuation</option><option>Re-Valuation</option><option>Re-Confirmation</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Property Owner Name</label>
            <input type="text" id="f_PropertyOwnerName">
          </div>
          <div class="form-group">
            <label>Borrower Name</label>
            <input type="text" id="f_BorrowerName">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Valuation Date *</label>
            <input type="date" id="f_ValuationDate" required>
          </div>
          <div class="form-group">
            <label>Site Visit Date</label>
            <input type="date" id="f_SiteVisitDate">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>FMV (NPR) *</label>
            <input type="number" id="f_ValuationAmount" required>
          </div>
          <div class="form-group">
            <label>Status *</label>
            <select id="f_Status">
              <option>Draft Prepared</option><option>PVR Sent</option><option>Full Valuation Prepared</option><option>Full Valuation Sent</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>BFI / Bank *</label>
          <select id="f_BfiSelect" required onchange="onBfiSelect()">
            <option value="">-- Select BFI --</option>
          </select>
        </div>
        <div class="form-group">
          <label>Site Visit Done By</label>
          <div id="f_StaffCheckboxes" class="staff-checkboxes">
            <p style="color:var(--text-muted);font-size:0.88rem;width:100%;">Loading staff...</p>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Initiated By</label>
            <select id="f_InitiatedBy">
              <option value="">-- Select --</option>
            </select>
          </div>
          <div class="form-group">
            <label>Verified By</label>
            <input type="text" id="f_VerifiedBy" disabled style="background:#eef2f6;cursor:not-allowed;">
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline" style="border-color:var(--primary-dark);color:var(--primary-dark);background:var(--white);" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn btn-primary" id="saveBtn">Save</button>
        </div>
      </form>
    </div>
  </div>

  <div id="viewModal" class="modal-overlay" style="display:none;">
    <div class="modal" style="max-width:560px;">
      <div class="modal-header">
        <h3 id="viewModalTitle">Valuation Details</h3>
        <button class="modal-close" onclick="closeViewModal()">&times;</button>
      </div>
      <div id="viewModalBody" style="display:grid;gap:12px;"></div>
      <div class="modal-footer" id="viewModalFooter">
        <button type="button" class="btn btn-outline" style="border-color:var(--primary-dark);color:var(--primary-dark);background:var(--white);" onclick="closeViewModal()">Close</button>
      </div>
    </div>
  </div>

  <footer>
    <div class="container">
      <div class="footer-bottom">
        <p>&copy; 2026 Balaji Technical Designing and Consultancy. All rights reserved.</p>
      </div>
    </div>
  </footer>

<script type="module">
import { auth, db } from './js/firebase-config.js';
import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
import {
  collection, query, orderBy, onSnapshot,
  addDoc, setDoc, updateDoc, doc, getDoc,
  runTransaction, serverTimestamp, getDocs
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const COLL = 'valuations';
const PUBLIC_COLL = 'public';
const COUNTER_DOC = 'counters/valuations';
const BFIS_COLL = 'bfis';

window.currentUser = null;
window.valuationsData = [];

onAuthStateChanged(auth, async (user) => {
  const content = document.getElementById('staffContent');
  const check = document.getElementById('authCheck');
  if (!user) { window.location.href = 'login.html'; return; }
  const snap = await getDoc(doc(db, 'users', user.uid));
  if (!snap.exists() || snap.data().role !== 'staff') {
    await signOut(auth);
    window.location.href = 'login.html';
    return;
  }
  window.currentUser = user;
  document.getElementById('userInfo').textContent = 'Logged in as: ' + user.email + ' (Staff)';
  check.style.display = 'none';
  content.style.display = 'block';
  startRealtimeListener();
  startBfiListener();
  loadStaffCheckboxes();
});

function startRealtimeListener() {
  const q = query(collection(db, COLL), orderBy('createdAt', 'desc'));
  onSnapshot(q, (snapshot) => {
    window.valuationsData = [];
    snapshot.forEach(doc => {
      window.valuationsData.push({ id: doc.id, ...doc.data() });
    });
    renderTable();
    document.getElementById('loadingSpinner').style.display = 'none';
  }, (err) => {
    document.getElementById('loadingSpinner').innerHTML = 'Error: ' + err.message;
  });
}

window.bfiData = [];
window.unsubBfis = null;

function startBfiListener() {
  const q = query(collection(db, BFIS_COLL), orderBy('createdAt', 'desc'));
  window.unsubBfis = onSnapshot(q, (snapshot) => {
    window.bfiData = [];
    snapshot.forEach(doc => {
      window.bfiData.push({ id: doc.id, ...doc.data() });
    });
    populateBfiSelect();
  });
}

function populateBfiSelect() {
  const sel = document.getElementById('f_BfiSelect');
  if (!sel) return;
  const currentVal = sel.value;
  sel.innerHTML = '<option value="">-- Select BFI --</option>';
  window.bfiData.forEach(b => {
    const val = (b.bfiName || '') + '||' + (b.branch || '');
    const label = b.bfiName + ' - ' + (b.branch || '') + (b.contactNumber ? ' (' + b.contactNumber + ')' : '');
    const opt = document.createElement('option');
    opt.value = val;
    opt.textContent = label;
    sel.appendChild(opt);
  });
  if ([...sel.options].some(o => o.value === currentVal)) sel.value = currentVal;
}

window.onBfiSelect = function() {
  const sel = document.getElementById('f_BfiSelect');
  const val = sel.value;
  if (!val) { window.selectedBfiName = ''; window.selectedBfiBranch = ''; return; }
  const parts = val.split('||');
  window.selectedBfiName = parts[0] || '';
  window.selectedBfiBranch = parts[1] || '';
};

window.renderTable = function() {
  const q = (document.getElementById('staffSearch').value || '').toLowerCase();
  const data = window.valuationsData.filter(r =>
    !q || (r.customerName||'').toLowerCase().includes(q) || (r.refNumber||'').toLowerCase().includes(q) || (r.valuationId||'').toLowerCase().includes(q)
  );
  const tbody = document.getElementById('staffTableBody');
  const noRec = document.getElementById('noRecords');
  if (!data.length) { tbody.innerHTML = ''; noRec.style.display = 'block'; return; }
  noRec.style.display = 'none';
  tbody.innerHTML = data.map(r => {
    const verified = r.verifiedBy && r.verifiedBy.trim();
    return `<tr>
      <td>${esc(r.valuationId)}</td>
      <td><strong>${esc(r.customerName)}</strong></td>
      <td>${esc(r.refNumber)}</td>
      <td>${esc(r.propertyAddress)}</td>
      <td>${esc(r.valuationType)}</td>
      <td>${esc(r.valuationDate)}</td>
      <td>${r.valuationAmount ? 'NPR ' + Number(r.valuationAmount).toLocaleString('en-IN') : '-'}</td>
      <td><span class="status-badge status-${esc((r.status||'pending').toLowerCase().replace(/\s+/g,'-'))}">${esc(r.status)}${verified ? ' &#x2705;' : ''}</span></td>
      <td class="action-btns">
        <button class="btn-sm btn-edit" onclick="viewValuation('${esc(r.id)}')">View</button>
        <button class="btn-sm btn-edit" onclick="editValuation('${esc(r.id)}')">Edit</button>
      </td>
    </tr>`;
  }).join('');
};

async function loadStaffCheckboxes() {
  const container = document.getElementById('f_StaffCheckboxes');
  const initBy = document.getElementById('f_InitiatedBy');
  if (!container) return;
  try {
    const snap = await getDocs(collection(db, 'users'));
    const fieldStaff = [];
    const allStaff = [];
    snap.forEach(d => {
      const u = d.data();
      if (u.role === 'staff') {
        allStaff.push({ name: u.displayName || u.email });
        if (u.fieldStaff) fieldStaff.push({ name: u.displayName || u.email });
      }
    });
    if (!fieldStaff.length) {
      container.innerHTML = '<p style="color:var(--text-muted);font-size:0.88rem;width:100%;">No field staff found.</p>';
    } else {
      container.innerHTML = '';
      fieldStaff.forEach(s => {
        const label = document.createElement('label');
        label.className = 'staff-checkbox-label';
        const cb = document.createElement('input');
        cb.type = 'checkbox'; cb.value = s.name;
        label.appendChild(cb);
        label.appendChild(document.createTextNode(s.name));
        container.appendChild(label);
      });
    }
    if (initBy) {
      initBy.innerHTML = '<option value="">-- Select --</option>';
      allStaff.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s.name;
        opt.textContent = s.name;
        initBy.appendChild(opt);
      });
    }
  } catch {
    container.innerHTML = '<p style="color:var(--error);font-size:0.88rem;width:100%;">Error loading staff.</p>';
  }
}

window.viewValuation = function(id) {
  const rec = window.valuationsData.find(r => r.id === id);
  if (!rec) return;
  document.getElementById('viewModalTitle').textContent = 'Valuation #' + esc(rec.valuationId);
  const body = document.getElementById('viewModalBody');
  const fields = [
    ['Customer Name', rec.customerName],
    ['Reference Number', rec.refNumber],
    ['Property Address', rec.propertyAddress],
    ['Plot Number', rec.plotNumber],
    ['Property Owner', rec.propertyOwnerName],
    ['Borrower Name', rec.borrowerName],
    ['Valuation Type', rec.valuationType],
    ['Valuation Date', rec.valuationDate],
    ['Site Visit Date', rec.siteVisitDate],
    ['Site Visit Done By', rec.siteVisitDoneBy ? rec.siteVisitDoneBy.join(', ') : '-'],
    ['FMV (NPR)', rec.valuationAmount ? Number(rec.valuationAmount).toLocaleString('en-IN') : '-'],
    ['Status', rec.status],
    ['BFI / Bank', rec.bfiName],
    ['Branch', rec.bfiBranch],
    ['Initiated By', rec.initiatedBy],
    ['Verified By', rec.verifiedBy || 'Not verified']
  ];
  body.innerHTML = fields.map(f =>
    `<div><strong style="color:var(--text-dark);font-size:0.88rem;">${esc(f[0])}:</strong> <span style="color:var(--text-body);font-size:0.88rem;">${esc(f[1])}</span></div>`
  ).join('');
  document.getElementById('viewModal').style.display = 'flex';
};

window.closeViewModal = function() {
  document.getElementById('viewModal').style.display = 'none';
};

window.showAddModal = function() {
  document.getElementById('modalTitle').textContent = 'Add Valuation';
  document.getElementById('saveBtn').textContent = 'Add Valuation';
  document.getElementById('editDocId').value = '';
  document.getElementById('valuationForm').reset();
  document.getElementById('f_ValuationDate').value = new Date().toISOString().split('T')[0];
  document.querySelectorAll('#f_StaffCheckboxes input[type="checkbox"]').forEach(cb => cb.checked = false);
  window.selectedBfiName = '';
  window.selectedBfiBranch = '';
  document.getElementById('valuationModal').style.display = 'flex';
};

window.editValuation = function(id) {
  const rec = window.valuationsData.find(r => r.id === id);
  if (!rec) return;
  document.getElementById('modalTitle').textContent = 'Edit Valuation #' + esc(rec.valuationId);
  document.getElementById('saveBtn').textContent = 'Update Valuation';
  document.getElementById('editDocId').value = id;
  document.getElementById('f_CustomerName').value = rec.customerName || '';
  document.getElementById('f_RefNumber').value = rec.refNumber || '';
  document.getElementById('f_PropertyAddress').value = rec.propertyAddress || '';
  document.getElementById('f_PlotNumber').value = rec.plotNumber || '';
  document.getElementById('f_PropertyOwnerName').value = rec.propertyOwnerName || '';
  document.getElementById('f_BorrowerName').value = rec.borrowerName || '';
  document.getElementById('f_ValuationType').value = rec.valuationType || 'Fresh Valuation';
  document.getElementById('f_ValuationDate').value = rec.valuationDate || '';
  document.getElementById('f_SiteVisitDate').value = rec.siteVisitDate || '';
  document.getElementById('f_ValuationAmount').value = rec.valuationAmount || '';
  document.getElementById('f_Status').value = rec.status || 'Draft Prepared';
  const bfiSelect = document.getElementById('f_BfiSelect');
  const bfiVal = (rec.bfiName || '') + '||' + (rec.bfiBranch || '');
  if ([...bfiSelect.options].some(o => o.value === bfiVal)) {
    bfiSelect.value = bfiVal;
    window.selectedBfiName = rec.bfiName || '';
    window.selectedBfiBranch = rec.bfiBranch || '';
  }
  document.getElementById('f_InitiatedBy').value = rec.initiatedBy || '';
  const siteStaff = rec.siteVisitDoneBy || [];
  document.querySelectorAll('#f_StaffCheckboxes input[type="checkbox"]').forEach(cb => {
    cb.checked = siteStaff.includes(cb.value);
  });
  document.getElementById('valuationModal').style.display = 'flex';
};

window.closeModal = function() {
  document.getElementById('valuationModal').style.display = 'none';
};

window.saveValuation = async function(e) {
  e.preventDefault();
  const btn = document.getElementById('saveBtn');
  const editId = document.getElementById('editDocId').value;
  const isEdit = !!editId;
  const staffCheckboxes = document.querySelectorAll('#f_StaffCheckboxes input[type="checkbox"]:checked');
  const siteVisitDoneBy = Array.from(staffCheckboxes).map(cb => cb.value);
  const data = {
    customerName: document.getElementById('f_CustomerName').value.trim(),
    refNumber: document.getElementById('f_RefNumber').value.trim(),
    propertyAddress: document.getElementById('f_PropertyAddress').value.trim(),
    plotNumber: document.getElementById('f_PlotNumber').value.trim(),
    propertyOwnerName: document.getElementById('f_PropertyOwnerName').value.trim(),
    borrowerName: document.getElementById('f_BorrowerName').value.trim(),
    valuationType: document.getElementById('f_ValuationType').value,
    valuationDate: document.getElementById('f_ValuationDate').value,
    siteVisitDate: document.getElementById('f_SiteVisitDate').value,
    siteVisitDoneBy,
    valuationAmount: Number(document.getElementById('f_ValuationAmount').value),
    status: document.getElementById('f_Status').value,
    bfiName: window.selectedBfiName || '',
    bfiBranch: window.selectedBfiBranch || '',
    initiatedBy: document.getElementById('f_InitiatedBy').value.trim(),
    updatedAt: serverTimestamp()
  };

  btn.textContent = 'Saving...';
  btn.disabled = true;

  try {
    if (isEdit) {
      const existing = window.valuationsData.find(r => r.id === editId);
      await updateDoc(doc(db, COLL, editId), data);
      const refNum = data.refNumber || (existing && existing.refNumber);
      if (refNum) {
        await setPublicDoc(refNum, data);
      }
      showToast('Valuation updated', 'success');
    } else {
      const nextId = await getNextValuationId();
      const fullData = {
        ...data,
        valuationId: nextId,
        createdBy: window.currentUser.uid,
        createdAt: serverTimestamp(),
        verifiedBy: '',
        verifiedAt: null
      };
      const docRef = await addDoc(collection(db, COLL), fullData);
      if (data.refNumber) {
        await setPublicDoc(data.refNumber, data);
      }
      showToast('Valuation added (ID: ' + nextId + ')', 'success');
    }
    closeModal();
  } catch (err) {
    showToast('Error: ' + err.message, 'error');
  }
  btn.textContent = isEdit ? 'Update Valuation' : 'Add Valuation';
  btn.disabled = false;
};

async function setPublicDoc(refNum, data) {
  const publicRef = doc(db, PUBLIC_COLL, refNum);
  const existing = await getDoc(publicRef);
  await setDoc(publicRef, {
    customerName: data.customerName,
    status: data.status,
    valuationDate: data.valuationDate,
    valuationType: data.valuationType,
    valuationAmount: data.valuationAmount,
    initiatedBy: data.initiatedBy,
    verifiedBy: existing.exists() ? existing.data().verifiedBy || '' : '',
    bfiName: data.bfiName || (existing.exists() ? existing.data().bfiName || '' : ''),
    bfiBranch: data.bfiBranch || (existing.exists() ? existing.data().bfiBranch || '' : '')
  }, { merge: true });
}

async function getNextValuationId() {
  const ref = doc(db, COUNTER_DOC);
  return await runTransaction(db, async (tx) => {
    const snap = await tx.get(ref);
    if (!snap.exists()) { tx.set(ref, { count: 1 }); return '0001'; }
    const next = snap.data().count + 1;
    tx.update(ref, { count: next });
    return String(next).padStart(4, '0');
  });
}

window.handleLogout = function() {
  signOut(auth);
  window.location.href = 'login.html';
};

function esc(s) { const d = document.createElement('div'); d.textContent = s == null ? '' : String(s); return d.innerHTML; }
window.showToast = function(msg, type) {
  const t = document.createElement('div');
  t.textContent = msg;
  t.className = 'toast ' + (type === 'success' ? 'success' : 'error');
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity 0.3s'; setTimeout(() => t.remove(), 300); }, 4000);
};
</script>
</body>
</html>
